spring.application.name=Falcon Booking System API
spring.profiles.default=dev
server.servlet.context-path=/api
spring.jackson.mapper.accept-case-insensitive-enums=true

#Admin credentials
app.admin.email=admin@falcon.com
app.admin.password=admin123

#JWT
app.jwt.secret-key=f4Lc0nB00k1ng
app.jwt.issuer=FalconBookingSystem
app.jwt.expiration-ms=3600000

#Domain Variables
app.generation.horizon-days=180
app.generation.batch-size=50
app.generation.minimum-hours-before-departure=30
app.flight.status.update-rate-ms=60000
app.flight.check-in.hours-before-to-start=24
app.flight.check-in.hours-before-to-close=1
app.flight.boarding.minutes-before-to-start=40
app.flight.boarding.minutes-before-to-close=15

#Allowed origins for CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Hibernate batch inserts
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

#FlyWay
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
